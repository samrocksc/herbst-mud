version: '3.8'

services:
  mud-ssh:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4444:4444"
    volumes:
      - ./cmd/ssh:/app/cmd/ssh
      - ./bin:/app/bin
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
    environment:
      - GODEBUG=netdns=go
    depends_on:
      - postgres

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: herbst
      POSTGRES_PASSWORD: herbst_password
      POSTGRES_DB: herbst_mud
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
