name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          cd server
          go test -v ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd server
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          OUTPUT_NAME="herbst-server-${GOOS}-${GOARCH}${EXT}"
          go build -o "$OUTPUT_NAME" -ldflags "-s -w -X main.version=${{ github.ref_name }}" .

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: server/herbst-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          asset_name: herbst-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          asset_content_type: application/octet-stream

  create-release:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release-notes
        run: |
          # Parse conventional commits for changelog
          TAG=${{ github.ref_name }}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"%s|%h|%b" 2>/dev/null || git log --pretty=format:"%s|%h|%b" -n 50)
          else
            COMMITS=$(git log --pretty=format:"%s|%h|%b" -n 50)
          fi
          
          # Categorize commits
          FEAT_CHANGES=""
          FIX_CHANGES=""
          OTHER_CHANGES=""
          
          while IFS='|' read -r msg hash body; do
            case "$msg" in
              feat*|feat!*)
                FEAT_CHANGES="${FEAT_CHANGES}- ${msg} (${hash})\n"
                ;;
              fix*|fix!*)
                FIX_CHANGES="${FIX_CHANGES}- ${msg} (${hash})\n"
                ;;
              *)
                OTHER_CHANGES="${OTHER_CHANGES}- ${msg} (${hash})\n"
                ;;
            esac
          done <<< "$COMMITS"
          
          # Build release body
          BODY="## What's Changed\n\n"
          
          if [ -n "$FEAT_CHANGES" ]; then
            BODY="${BODY}### ✨ New Features\n${FEAT_CHANGES}\n"
          fi
          
          if [ -n "$FIX_CHANGES" ]; then
            BODY="${BODY}### 🐛 Bug Fixes\n${FIX_CHANGES}\n"
          fi
          
          if [ -n "$OTHER_CHANGES" ]; then
            BODY="${BODY}### Other Changes\n${OTHER_CHANGES}\n"
          fi
          
          BODY="${BODY}\n---\n*Generated from conventional commits*"
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-changelog:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update CHANGELOG.md
        run: |
          TAG=${{ github.ref_name }}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Get changes between tags
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" 2>/dev/null || echo "")
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" -n 50)
          fi
          
          # Extract categories
          ADDED=$(echo "$CHANGES" | grep -E "^-\s+(feat|feature)" || echo "- None")
          CHANGED=$(echo "$CHANGES" | grep -E "^-\s+(refactor|chore|perf|docs|style)" || echo "- None")
          FIXED=$(echo "$CHANGES" | grep -E "^-\s+(fix|bugfix)" || echo "- None")
          
          # Create new entry
          cat > /tmp/changelog_entry.md << EOF
          ## [$TAG] - $(date +%Y-%m-%d)

          ### Added
          $ADDED

          ### Changed
          $CHANGED

          ### Fixed
          $FIXED

          ### Security
          - None
          EOF
          
          # Insert after the "Unreleased" section header
          head -n 10 CHANGELOG.md > /tmp/changelog_new.md
          cat /tmp/changelog_entry.md >> /tmp/changelog_new.md
          tail -n +11 CHANGELOG.md >> /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

      - name: Commit CHANGELOG update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          git commit -m "docs: Update CHANGELOG for ${{ github.ref_name }}"
          git push