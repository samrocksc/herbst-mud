name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  GO_VERSION: "1.22"

jobs:
  build-admin-tui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: herbst-admin-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: herbst-admin-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: herbst-admin-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: herbst-admin-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build admin-tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd admin-tui
          go build -o ../${{ matrix.artifact_name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7

  release:
    needs: build-admin-tui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")
          PREV_MAJOR=$(echo $PREV_TAG | sed 's/v\([0-9]*\).*/\1/')
          PREV_MINOR=$(echo $PREV_TAG | sed 's/v[0-9]*.\([0-9]*\).*/\1/')
          PREV_PATCH=$(echo $PREV_TAG | sed 's/v[0-9]*.[0-9]*.\([0-9]*\)/\1/')
          PREV_MAJOR=${PREV_MAJOR:-0}
          PREV_MINOR=${PREV_MINOR:-0}
          PREV_PATCH=${PREV_PATCH:-0}
          COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s" -n 50)
          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
          fi
          if echo "$COMMITS" | grep -qE "^feat!.+:" || echo "$COMMITS" | grep -qE "^BREAKING CHANGE"; then
            BUMP_TYPE="major"
          fi
          case $BUMP_TYPE in
            major)
              NEW_MAJOR=$((PREV_MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            minor)
              NEW_MAJOR=$PREV_MAJOR
              NEW_MINOR=$((PREV_MINOR + 1))
              NEW_PATCH=0
              ;;
            patch)
              NEW_MAJOR=$PREV_MAJOR
              NEW_MINOR=$PREV_MINOR
              NEW_PATCH=$((PREV_PATCH + 1))
              ;;
          esac
          VERSION="v${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: herbst-admin-*
          merge-multiple: false

      - name: Create GitHub Release
        if: steps.version.outputs.version != 'v0.0.0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/herbst-admin-linux-amd64
            artifacts/herbst-admin-linux-arm64
            artifacts/herbst-admin-darwin-amd64
            artifacts/herbst-admin-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
