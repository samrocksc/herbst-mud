name: Release Workflow Tests

on:
  workflow_dispatch:

jobs:
  test-release-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate workflow file exists
        run: |
          test -f .github/workflows/release.yml
          echo "✓ Release workflow file exists"

      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/release.yml'))"
          echo "✓ Release workflow YAML is valid"

      - name: Test version bump logic - patch
        run: |
          # Create a mock commit that should trigger patch bump
          git log --oneline -5
          LAST_TAG="v0.1.0"
          COMMITS="feat: add new feature
fix: resolve bug"
          
          # This simulates the version bump logic
          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
          fi
          
          # With only fix commits, should be patch
          if [ "$BUMP_TYPE" = "patch" ]; then
            echo "✓ Patch bump detected correctly"
          else
            exit 1
          fi

      - name: Test version bump logic - minor
        run: |
          COMMITS="fix: resolve bug
feat: add new feature"
          
          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
          fi
          
          if [ "$BUMP_TYPE" = "minor" ]; then
            echo "✓ Minor bump detected correctly"
          else
            exit 1
          fi

      - name: Test version bump logic - major
        run: |
          COMMITS="fix: resolve bug
feat!: breaking change
fix: another fix"
          
          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -qE "^feat!.+:"; then
            BUMP_TYPE="major"
          fi
          
          if [ "$BUMP_TYPE" = "major" ]; then
            echo "✓ Major bump detected correctly"
          else
            exit 1
          fi

      - name: Test version calculation
        run: |
          PREV_TAG="v1.2.3"
          
          PREV_MAJOR=$(echo $PREV_TAG | sed 's/v\([0-9]*\).*/\1/')
          PREV_MINOR=$(echo $PREV_TAG | sed 's/v[0-9]*.\([0-9]*\).*/\1/')
          PREV_PATCH=$(echo $PREV_TAG | sed 's/v[0-9]*.[0-9]*.\([0-9]*\)/\1/')
          
          # Test patch bump
          NEW_MAJOR=$PREV_MAJOR
          NEW_MINOR=$PREV_MINOR
          NEW_PATCH=$((PREV_PATCH + 1))
          VERSION="v${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          
          if [ "$VERSION" = "v1.2.4" ]; then
            echo "✓ Version calculation correct: $VERSION"
          else
            echo "Expected v1.2.4, got $VERSION"
            exit 1
          fi

      - name: Test semantic version parsing
        run: |
          # Test various tag formats
          for TAG in "v1.0.0" "v0.1.0" "v2.3.4" "v10.20.30"; do
            MAJOR=$(echo $TAG | sed 's/v\([0-9]*\).*/\1/')
            MINOR=$(echo $TAG | sed 's/v[0-9]*.\([0-9]*\).*/\1/')
            PATCH=$(echo $TAG | sed 's/v[0-9]*.[0-9]*.\([0-9]*\)/\1/')
            echo "Parsed $TAG -> $MAJOR.$MINOR.$PATCH"
          done
          echo "✓ Semantic version parsing works"

  test-changelog-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changelog workflow exists
        run: |
          test -f .github/workflows/changelog.yml
          echo "✓ Changelog workflow file exists"

      - name: Validate changelog YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/changelog.yml'))"
          echo "✓ Changelog workflow YAML is valid"

      - name: Verify changelog structure
        run: |
          # Check CHANGELOG.md exists and has expected sections
          test -f CHANGELOG.md
          
          # Verify required sections
          grep -q "# Changelog" CHANGELOG.md
          grep -q "## \[Unreleased\]" CHANGELOG.md || grep -q "## \[Unreleased\]" CHANGELOG.md
          echo "✓ CHANGELOG.md has correct structure"